<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/gif" href="assetsmain/kone01.gif">
  <title>Maxans.fr</title>
  <link rel="stylesheet" href="style.css">
  <style>
#sg { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:#ffffff18; border:1px solid #ffffff22; width:min(780px,90vw); margin-top:32px; }
.sg-cell { background:#0238d8; padding:18px 20px; display:flex; flex-direction:column; gap:6px; }
.sg-cell.wide { grid-column:1/-1; }
.sg-cell.mid  { grid-column:span 2; }
.sg-lbl { font-family:'Space Mono',monospace; font-size:7px; letter-spacing:0.5em; color:#4466bb; text-transform:uppercase; }
.sg-val { font-family:'Space Mono',monospace; font-size:15px; letter-spacing:0.08em; color:#223388; transition:color .5s; }
.sg-val.on { color:#c8dcff; }
.sg-val.live { color:#6688dd; }
.sg-msg { font-family:'Space Mono',monospace; font-size:10px; color:#223388; font-style:italic; letter-spacing:0.04em; transition:color .5s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sg-msg.on { color:#8aaaee; }
.sg-bar { height:1px; background:linear-gradient(90deg,#4466bb,transparent); width:0; transition:width 1.2s ease; margin-top:6px; }
</style>
</head>
<body>

<div id="vignette"></div>
<div id="hint">Scroll</div>

<div id="scene">
  <div id="cube-shell">
    <div id="plan-haut">   <div class="bande" id="b-haut"></div>   </div>
    <div id="plan-centre"> <div class="bande" id="b-centre"></div> </div>
    <div id="plan-bas">    <div class="bande" id="b-bas"></div>    </div>
  </div>
</div>

<style>
  @media (max-width: 768px) {
    .s-body h2 {
      font-size: clamp(2.5rem, 10vw, 4rem);
    }
    .s-body p {
      font-size: 14px;
      line-height: 1.8;
    }
    .s-num {
      font-size: 13px;
    }
    .section {
      padding: 60px 0 0 30px;
    }
  }
</style>

<script>
const SECTIONS = [
  {
    num: '001',
    title: 'Maxans Albert',
    paras: [
      ' Etudiant en CPGE — Université Nice Côte d\'Azur ' +
      '<br>Polymathe par nature.' +
      '<br><a href="mailto:contact@maxans.fr" style="color:white">contact@maxans.fr</a>' +
      '<br><a href="http://instagram.com/maxans_albr" style="color:white">instagram.com/maxans_albr</a>'
    ]
  },
  {
    num: '002',
    title: 'Ce que jaime faire.',
    paras: [
      'Faire de la physique , photographie , lire des livres de plus de 1500g<br>vendre des données personelles , collectioner des cd , randonnées'
    ]
  },
  {
    num: '003',
    title: 'Photothèque.',
    paras: [
      'Cliquer ici pour acceder à ma photothèque'
    ]
  },
  {
    num: '004',
    title: 'Ma collection de cd.',
    paras: [
      '<a href="albums.html" style="color:white">Cliquer ici pour acceder à ma collection de cd</a>'
    ]
  },
  {
    num: '005',
    title: 'Horse\nHabit.',
    paras: [
      'C\'est exactement cet effet que le site référencé utilise.',
      'La structure cubique est fixe, rigide, permanente.',
      'Le contenu glisse à travers elle comme si l\'écran était courbé en cube.'
    ]
  },
  {
    num: '006',
    title: 'Ton\ncontenu\nici.',
    paras: [
      'Modifie le tableau SECTIONS[] dans le JS.',
      'Chaque section fait 70vh — la hauteur du plan central.',
      'Ajoute autant de sections que tu veux, le scroll s\'adapte.'
    ]
  },
  {
    num: '007',
    title: 'Customise.',
    paras: [
      'perspective: 150px → plus doux = 400px, plus intense = 80px.',
      'Angle rotateX: 45° → plus courbé = 70°, plus plat = 20°.',
      'Hauteur plans haut/bas: 15vh → ajuste selon le rendu voulu.'
    ]
  },
  {
    num: '008',
    title: 'Fin.',
    paras: [
      'Remonte au début pour revoir l\'effet depuis le départ.',
      'Le cube ne bouge jamais.',
      'C\'est toi qui traverses le contenu.'
    ]
  },
  {
  num: '00X',
  title: 'SYSTEM\nDATA.',
  paras: [
    '<div id="sg">'
    + '<div class="sg-cell wide"><div class="sg-lbl">░ DASHBOARD — MAXANS.FR ░</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Visites totales</div><div class="sg-val" data-sg="visits">——</div><div class="sg-bar" data-sg="bar-v"></div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Durée session</div><div class="sg-val live" data-sg="session">00:00</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Heure locale</div><div class="sg-val live" data-sg="clock">——:——:——</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Résolution</div><div class="sg-val" data-sg="res">——</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Navigateur</div><div class="sg-val" data-sg="ua">——</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Fuseau horaire</div><div class="sg-val" data-sg="tz">——</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Dernier commit SHA</div><div class="sg-val" data-sg="sha">——</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Δ Commit</div><div class="sg-val" data-sg="delta">——</div></div>'
    + '<div class="sg-cell"><div class="sg-lbl">Commits total</div><div class="sg-val" data-sg="total">——</div></div>'
    + '<div class="sg-cell wide"><div class="sg-lbl">Message</div><div class="sg-msg" data-sg="msg">——</div></div>'
    + '</div>'
  ]
},
{ num: '', title: '', paras: [''] },
{ num: '', title: '', paras: [''] },
{ num: '', title: '', paras: [''] },
{ num: '', title: '', paras: [''] },
];

const N = SECTIONS.length;
const vh = () => window.innerHeight;
const TOP_CENTRE = () => vh() * 0.15;
const H_CENTRE   = () => vh() * 0.70;
const maxScroll  = () => (N - 1) * H_CENTRE();

function renderSection(s) {
  const parasHTML = s.paras.map((p, i) =>
    (i > 0 ? '<div class="s-divider"></div>' : '') + '<p>' + p + '</p>'
  ).join('');
  return '<div class="section">'
    + '<div class="s-num">' + s.num + '</div>'
    + '<div class="s-body">'
    + '<h2>' + s.title.replace(/\n/g, '<br>') + '</h2>'
    + parasHTML
    + '</div></div>';
}

const bandeHTML = SECTIONS.map(renderSection).join('');
document.getElementById('b-haut').innerHTML   = bandeHTML;
document.getElementById('b-centre').innerHTML = bandeHTML;
document.getElementById('b-bas').innerHTML    = bandeHTML;

let scrollY = 0, currentY = 0, touchStartY = 0, isTouchingLink = false;

const hint = document.getElementById('hint');

// — Souris —
window.addEventListener('wheel', e => {
  scrollY = Math.max(0, Math.min(scrollY + e.deltaY, maxScroll()));
  hint.style.opacity = scrollY > 40 ? '0' : '1';
}, { passive: true });

// — Touch —
window.addEventListener('touchstart', e => {
  isTouchingLink = !!e.target.closest('a');
  touchStartY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (isTouchingLink) return;
  const delta = (touchStartY - e.touches[0].clientY) * 4 ;
  touchStartY = e.touches[0].clientY;
  scrollY = Math.max(0, Math.min(scrollY + delta, maxScroll()));
  hint.style.opacity = scrollY > 40 ? '0' : '1';
}, { passive: true });

// — Boucle d'animation —
function tick() {
  currentY += (scrollY - currentY) * 0.1;
  const y  = currentY;
  const tc = TOP_CENTRE();
  const hc = H_CENTRE();

  document.getElementById('b-haut').style.transform   = `translateY(${-y + tc}px)`;
  document.getElementById('b-centre').style.transform = `translateY(${-y}px)`;
  document.getElementById('b-bas').style.transform    = `translateY(${-y - hc}px)`;

  requestAnimationFrame(tick);
}

tick();
// STATS — querySelectorAll pour mettre à jour les 3 copies de la bande
const _t0 = Date.now();
const setV = (key, v) => document.querySelectorAll('[data-sg="'+key+'"]').forEach(e => { e.textContent = v; e.classList.add('on'); });

// Session + horloge live
setInterval(() => {
  const s = Math.floor((Date.now()-_t0)/1000);
  setV('session', String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'));
  const n = new Date();
  setV('clock', String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0'));
}, 1000);

// Navigateur / résolution / fuseau
const ua = navigator.userAgent;
setV('ua', ua.includes('Firefox')?'Firefox':ua.includes('Edg')?'Edge':ua.includes('OPR')?'Opera':ua.includes('Chrome')?'Chrome':ua.includes('Safari')?'Safari':'Autre');
setV('res', screen.width+'×'+screen.height);
setV('tz', Intl.DateTimeFormat().resolvedOptions().timeZone);

// Visites — counterapi.dev (remplaçant de CountAPI)
(async () => { try {
  const d = await (await fetch('https://api.counterapi.dev/v1/ma-X71/monsiteV2/up')).json();
  setV('visits', d.count.toLocaleString('fr-FR'));
  document.querySelectorAll('[data-sg="bar-v"]').forEach(e => setTimeout(() => e.style.width='100%', 200));
} catch(e) { setV('visits','n/a'); } })();

// GitHub — dernier commit + total
(async () => { try {
  const res = await fetch('https://api.github.com/repos/ma-X71/monsiteV2/commits?per_page=1');
  const link = res.headers.get('Link') || '';
  const match = link.match(/page=(\d+)>; rel="last"/);
  setV('total', match ? match[1] : '?');
  const [c] = await res.json();
  setV('sha', c.sha.slice(0,7));
  setV('msg', c.commit.message.split('\n')[0]);
  const ago = Math.floor((Date.now() - new Date(c.commit.author.date)) / 86400000);
  setV('delta', ago === 0 ? "aujourd'hui" : ago === 1 ? 'il y a 1j' : 'il y a '+ago+'j');
} catch(e) { setV('sha','n/a'); } })();
window.addEventListener('resize', () => {
  scrollY = Math.min(scrollY, maxScroll());
});
</script>
</body>
</html>
